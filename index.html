<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Puzzle - Ladur Team</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --accent: #f39c12;
            --dark: #1a1a1a;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; background: var(--dark); color: white; margin: 0; padding: 20px;
        }
        .game-container { position: relative; width: 420px; height: 320px; margin: 20px auto; border: 5px solid #333; border-radius: 10px; overflow: hidden; background: #000; }
        
        #main-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; object-fit: cover;
        }

        .grid-container { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr);
            width: 100%; height: 100%;
            position: relative; z-index: 2;
        }

        .box { 
            background: var(--primary); border: 1px solid #34495e;
            color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; transition: all 0.4s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }
        .wrong-reveal { background: var(--danger) !important; opacity: 1 !important; }

        .quiz-container { 
            margin-top: 20px; padding: 25px; background: #2c3e50; 
            border-radius: 15px; display: inline-block; width: 100%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-opt { 
            padding: 15px; margin: 10px 5px; cursor: pointer; border: none; 
            background: #ecf0f1; color: var(--primary); border-radius: 8px; font-size: 16px;
            font-weight: bold; transition: 0.2s; width: 45%;
        }
        .btn-opt:hover { background: var(--accent); color: white; }
        
        .btn-reset { 
            background: var(--success); color: white; padding: 15px 30px; 
            border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: none; margin-top: 15px;
        }

        footer { margin-top: 40px; padding: 20px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>IMAGE REVEAL</h1>
    <p id="status">Jangan sampai salah, atau gambar akan terkunci!</p>
    
    <div class="game-container">
        <img id="main-image" src="" alt="Mystery">
        <div class="grid-container" id="grid"></div>
    </div>

    <div class="quiz-container" id="quiz-box">
        <h3 id="question-text">Memuat...</h3>
        <div id="options">
            <button onclick="checkAnswer(0)" id="opt0" class="btn-opt"></button>
            <button onclick="checkAnswer(1)" id="opt1" class="btn-opt"></button>
        </div>
        <button class="btn-reset" id="reset-btn" onclick="startGame()">Coba Lagi</button>
    </div>

    <footer>hiburan para ladur</footer>

    <script>
        const imageList = [
            "https://osolihin.wordpress.com/wp-content/uploads/2011/10/bencong-gagal-5.jpg",
            "https://i1.sndcdn.com/artworks-000138462280-6dvyid-t500x500.jpg"
        ];

        // Daftar 100 Pertanyaan (Disingkat untuk contoh, silakan tambah sesuai pola)
        const masterQuestions = [
            { q: "Planet terbesar?", a: ["Jupiter", "Mars"], c: 0 },
            { q: "Mata uang Jepang?", a: ["Won", "Yen"], c: 1 },
            { q: "Presiden RI ke-1?", a: ["Soekarno", "Hatta"], c: 0 },
            { q: "Warna daun?", a: ["Biru", "Hijau"], c: 1 },
            { q: "Ibukota Inggris?", a: ["London", "Paris"], c: 0 },
            { q: "Hasil 10 x 10?", a: ["100", "1000"], c: 0 },
            { q: "Hewan tercepat?", a: ["Cheetah", "Singa"], c: 0 },
            { q: "Gas Oksigen?", a: ["O2", "CO2"], c: 0 },
            { q: "Benua Indonesia?", a: ["Asia", "Eropa"], c: 0 },
            { q: "Raja Hutan?", a: ["Gajah", "Singa"], c: 1 },
            { q: "Berapa 1 menit?", a: ["60 dtk", "100 dtk"], c: 0 },
            { q: "Arah matahari terbit?", a: ["Barat", "Timur"], c: 1 },
            { q: "Ibukota Jepang?", a: ["Tokyo", "Seoul"], c: 0 },
            { q: "Jumlah sila Pancasila?", a: ["5", "4"], c: 0 },
            { q: "Logam termurah?", a: ["Emas", "Besi"], c: 1 },
            { q: "Paus bernapas dengan?", a: ["Paru-paru", "Insang"], c: 0 }
            // ... tambahkan hingga 100 ...
        ];

        let gameQuestions = [];
        let currentStep = 0;
        let boxOrder = [];

        function startGame() {
            currentStep = 0;
            gameQuestions = masterQuestions.sort(() => Math.random() - 0.5).slice(0, 12);
            document.getElementById('main-image').src = imageList[Math.floor(Math.random() * imageList.length)];

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            boxOrder = Array.from({length: 12}, (_, i) => i).sort(() => Math.random() - 0.5);

            for(let i=0; i<12; i++) {
                const div = document.createElement('div');
                div.className = 'box';
                div.id = 'box' + i;
                div.innerText = "?";
                grid.appendChild(div);
            }

            document.getElementById('options').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('status').innerText = "Level 1: Siap?";
            document.getElementById('status').style.color = "white";
            loadQuestion();
        }

        function loadQuestion() {
            if (currentStep < gameQuestions.length) {
                const qData = gameQuestions[currentStep];
                document.getElementById("question-text").innerText = qData.q;
                document.getElementById("opt0").innerText = qData.a[0];
                document.getElementById("opt1").innerText = qData.a[1];
            } else {
                gameOver(true);
            }
        }

        function checkAnswer(choice) {
            if (choice === gameQuestions[currentStep].c) {
                const targetBoxId = boxOrder[currentStep];
                document.getElementById("box" + targetBoxId).classList.add("hidden");
                currentStep++;
                document.getElementById('status').innerText = "Level " + (currentStep + 1) + ": Benar!";
                loadQuestion();
            } else {
                gameOver(false);
            }
        }

        function gameOver(isWin) {
            document.getElementById('options').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'inline-block';
            
            if (isWin) {
                document.getElementById("question-text").innerText = "🏆 MENANG! Gambar Terungkap.";
                document.getElementById('status').innerText = "Luar biasa!";
            } else {
                document.getElementById("question-text").innerText = "💥 GAME OVER!";
                document.getElementById('status').innerText = "Salah! Gambar langsung dikunci.";
                document.getElementById('status').style.color = "#e74c3c";
                
                // Tutup kembali kotak yang sempat terbuka agar gambar tidak terlihat
                const allBoxes = document.querySelectorAll('.box');
                allBoxes.forEach(box => {
                    box.classList.remove('hidden');
                    box.classList.add('wrong-reveal');
                    box.innerText = "X";
                });
            }
        }

        startGame();
    </script>
</body>
</html>
